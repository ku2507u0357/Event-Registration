<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Registration</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #a18cd1);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CONTAINER */
.container {
    width: 900px;
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* LEFT PANEL */
.left {
    width: 40%;
    padding: 40px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h2 {
    font-size: 28px;
    margin-bottom: 10px;
}

.left p {
    font-size: 14px;
    opacity: 0.8;
}

/* RIGHT PANEL (FORM) */
.right {
    width: 60%;
    padding: 40px;
    background: rgba(255,255,255,0.1);
}

.input-group {
    position: relative;
    margin-bottom: 18px;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.25);
    color: white;
}

/* FLOATING LABEL */
label {
    position: absolute;
    left: 12px;
    top: 12px;
    font-size: 13px;
    color: #eee;
    transition: 0.3s;
}

input:focus + label,
input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 11px;
}

select {
    color: white;
}

option {
    color: black;
}

.multi {
    height: 90px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* RESPONSIVE */
@media(max-width: 768px){
    .container {
        flex-direction: column;
        width: 90%;
    }

    .left, .right {
        width: 100%;
    }
}
</style>

<script>
function updateEvents(){
    let type = document.getElementById("event_type").value;
    let select = document.getElementById("event_name");

    let data = {
        "Ariaro":["Lok Sabha🕍","AR-VR 🎮","Data Science Workshop📊"],
        "Eqinox":["Cricket🏏","Volleyball🏐","Basketball🏀","Football⚽"]
    };

    select.innerHTML="";

    if(data[type]){
        data[type].forEach(e=>{
            let opt=document.createElement("option");
            opt.value=e;
            opt.text=e;
            select.appendChild(opt);
        });
    }
}
</script>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2>EVENT REGISTRATION</h2>
        <p>REGISTER FOR COLLEGE EVENTS</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

      <form action="/submit" method="POST">

            <div class="input-group">
                <input type="text" name="name" placeholder=" " required>
                <label>NAME:</label>
            </div>

            <div class="input-group">
                <input type="text" name="enrollment" placeholder=" " required>
                <label>ENROLLMENT ID:</label>
            </div>

            <div class="input-group">
                <input type="text" name="ku_id" placeholder=" " required>
                <label>KU ID:</label>
            </div>

            <div class="input-group">
                <input type="text" name="class" placeholder=" " required>
                <label>CLASS:</label>
            </div>

            <div class="input-group">
                <select id="event_type" name="event_type" onchange="updateEvents()" required>
                    <option value="">EVENTS:</option>
                    <option value="Ariaro">ARIARO</option>
                    <option value="Eqinox">EQINOX</option>
                </select>
            </div>

            <div class="input-group">
                <select id="event_name" name="event_name" multiple class="multi" required></select>
            </div>

            <button type="submit">REGISTER➡️</button>

        </form>

    </div>

</div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.querySelector('[name="name"]').value;
  const event = document.getElementById("event_name").value;

  try {
    await addDoc(collection(db, "registrations"), {
      name,
      event,
      time: new Date()
    });

    alert("Registration Successful!");
  } catch (err) {
    alert("Error!");
    console.error(err);
  }
});
</script>

</body>
</html>
